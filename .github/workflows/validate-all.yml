# These jobs are run on everything, including main and PRs.
name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  XCODE_VERSION: "26.5"

jobs:
  release-config:
    name: Release Config
    timeout-minutes: 5
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      # The repo Actions allowlist permits GitHub-owned actions only, so this
      # uses the Ruby version already installed on the macOS runner.
      - name: Install Ruby dependencies
        run: |
          ruby -v
          bundle install

      - name: Validate Ruby and Fastlane config
        run: |
          ruby -v
          bundle exec ruby -c fastlane/Fastfile
          bundle exec fastlane --version
          bundle exec fastlane lanes

  lint:
    name: Lint
    timeout-minutes: 2
    runs-on: macos-26
    defaults:
      run:
        working-directory: ./Vault

    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm/repositories
            Vault/.build
          key: ${{ runner.os }}-spm-lint-xcode-${{ env.XCODE_VERSION }}-${{ hashFiles('Vault/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-lint-xcode-${{ env.XCODE_VERSION }}-

      - name: Check Linting & Formatting
        run: make lint

  ci-ios:
    name: CI_iOS
    timeout-minutes: 20
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Log Xcode Version
        run: xcodebuild -version

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm/repositories
          key: ${{ runner.os }}-spm-ci-ios-xcode-${{ env.XCODE_VERSION }}-${{ hashFiles('Vault/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-ci-ios-xcode-${{ env.XCODE_VERSION }}-

      - name: Test CI_iOS
        run: |
          xcodebuild test \
            -workspace Vault.xcworkspace \
            -scheme CI_iOS \
            -testPlan iOSAllTests \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.5' \
            -skipMacroValidation \
            -skipPackagePluginValidation
